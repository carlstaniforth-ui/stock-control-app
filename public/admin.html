<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Stock Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --accent-primary: #ff6b35;
            --accent-secondary: #ffa94d;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --border-color: #4a4a4a;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --steel-blue: #5a7d9a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border-bottom: 2px solid var(--accent-primary);
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--accent-primary) 50%, transparent 100%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--accent-primary);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: var(--bg-primary);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .header-nav {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .nav-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* ── Container ── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 24px;
            position: relative;
            overflow: hidden;
            clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-primary);
        }

        .stat-card.warning::before { background: var(--warning); }
        .stat-card.danger::before  { background: var(--danger); }
        .stat-card.success::before { background: var(--success); }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-detail {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ── Action Bar ── */
        .action-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-secondary);
            border-color: var(--accent-secondary);
            color: var(--bg-primary);
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        /* ── Search ── */
        .search-box input {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px;
            font-size: 14px;
            width: 280px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            font-family: inherit;
        }

        .search-box input::placeholder { color: var(--text-secondary); }
        .search-box input:focus { outline: none; border-color: var(--accent-primary); }

        /* ── Inventory Grid ── */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 20px;
            position: relative;
            transition: all 0.3s;
            clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
        }

        .item-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .item-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .item-sku {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stock-badge {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 700;
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
            white-space: nowrap;
        }

        .stock-badge.high   { background: var(--success); color: white; }
        .stock-badge.medium { background: var(--warning); color: white; }
        .stock-badge.low    { background: var(--danger);  color: white; }

        .item-details {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .detail-label {
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            padding: 9px 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
            text-align: center;
            font-family: inherit;
        }

        .action-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .action-btn.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        /* ── Alerts ── */
        .alert {
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .alert-error   { background: rgba(244, 67, 54, 0.15); color: #ff6b6b; border-left: 3px solid var(--danger); }
        .alert-success { background: rgba(76, 175, 80, 0.15); color: #69db7c; border-left: 3px solid var(--success); }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            grid-column: 1 / -1;
        }

        .empty-state-icon { font-size: 64px; opacity: 0.3; margin-bottom: 16px; }
        .empty-state-text { color: var(--text-secondary); font-size: 16px; }

        /* ── Modal Backdrop ── */
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-backdrop.active { display: flex; }

        .modal-box {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            padding: 32px;
            max-width: 600px;
            width: 90%;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .modal-box.modal-sm {
            max-width: 420px;
        }

        .modal-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
            padding-bottom: 16px;
            border-bottom: 2px solid var(--accent-primary);
        }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .form-input:focus { outline: none; border-color: var(--accent-primary); }
        .form-input::placeholder { color: var(--text-secondary); }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions .btn { flex: 1; justify-content: center; }

        /* ── QR Modal specifics ── */
        .qr-image-wrap {
            text-align: center;
            margin: 20px 0;
        }

        .qr-image-wrap img {
            max-width: 220px;
            background: white;
            padding: 12px;
        }

        .qr-url {
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
            text-align: center;
            margin-bottom: 20px;
        }

        /* ── Login Screen ── */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .login-logo .logo { width: 40px; height: 40px; font-size: 16px; }

        .login-logo h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
        }

        .tab {
            padding: 10px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .tab:hover { color: var(--text-primary); }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent-primary);
            border: none;
            color: var(--bg-primary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 8px;
        }

        .login-btn:hover { background: var(--accent-secondary); transform: translateY(-2px); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Utilities ── */
        .hidden { display: none !important; }

        /* ── Print ── */
        @media print {
            body * { visibility: hidden; }
            #qr-modal, #qr-modal * { visibility: visible; }
            #qr-modal {
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: white !important;
                display: flex !important;
                align-items: center;
                justify-content: center;
            }
            .modal-box { border: none; clip-path: none; }
            .modal-actions { display: none !important; }
            .qr-image-wrap img { max-width: 350px; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 16px; padding: 20px; }
            .header-nav { flex-wrap: wrap; }
            .container { padding: 20px; }
            .action-bar { flex-direction: column; gap: 16px; }
            .search-box input { width: 100%; }
            .inventory-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════════════════ LOGIN SCREEN ═══════════════════════════════════ -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <div class="login-logo">
                <div class="logo">SC</div>
                <h2>Stock Control System</h2>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <div id="alert-login"></div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-username">Username</label>
                    <input class="form-input" type="text" id="login-username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input class="form-input" type="password" id="login-password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="register-username">Username</label>
                    <input class="form-input" type="text" id="register-username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-password">Password</label>
                    <input class="form-input" type="password" id="register-password" required minlength="10" autocomplete="new-password">
                    <p class="form-hint">Min 10 characters, at least one uppercase letter and one number</p>
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-password-confirm">Confirm Password</label>
                    <input class="form-input" type="password" id="register-password-confirm" required minlength="10" autocomplete="new-password">
                </div>
                <button type="submit" class="login-btn">Register</button>
            </form>
        </div>
    </div>

    <!-- ═══════════════════════════════════ DASHBOARD ═══════════════════════════════════ -->
    <div id="dashboard" class="hidden">

        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="logo">SC</div>
                    <h1>Stock Control</h1>
                </div>
                <div class="header-right">
                    <span class="user-label" id="username-display"></span>
                    <div class="header-nav">
                        <button class="nav-btn hidden" id="users-btn" onclick="window.location.href='/users.html'">👥 Users</button>
                        <button class="nav-btn" onclick="window.location.href='/reports.html'">📊 Reports</button>
                        <button class="nav-btn" onclick="window.location.href='/guide.html'">📖 Guide</button>
                        <button class="nav-btn" onclick="logout()">Logout</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container">

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card success">
                    <div class="stat-label">Total Items</div>
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-detail">Unique SKUs in inventory</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-label">Total Stock</div>
                    <div class="stat-value" id="stat-stock">0</div>
                    <div class="stat-detail">Units across all items</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-label">Low Stock</div>
                    <div class="stat-value" id="stat-low">0</div>
                    <div class="stat-detail">Items with 5 or fewer units</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-label">Out of Stock</div>
                    <div class="stat-value" id="stat-outofstock">0</div>
                    <div class="stat-detail">Items requiring attention</div>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="action-bar">
                <div class="action-buttons">
                    <button class="btn btn-primary admin-only hidden" onclick="openAddModal()">+ Add Item</button>
                    <button class="btn" onclick="exportToCSV()">📥 Export CSV</button>
                    <button class="btn admin-only hidden" onclick="document.getElementById('csv-upload').click()">📤 Import CSV</button>
                    <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
                    <button class="btn admin-only hidden" onclick="printAllQRCodes()" id="print-all-btn">🖨️ Print All QR</button>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search inventory..." oninput="filterItems(this.value)">
                </div>
            </div>

            <!-- Alert for add-item actions (shown below action bar) -->
            <div id="alert-add"></div>

            <!-- Inventory Grid -->
            <div id="items-container" class="inventory-grid"></div>

        </div>
    </div>

    <!-- ═══════════════════════════════════ ADD ITEM MODAL ═══════════════════════════════════ -->
    <div id="add-modal" class="modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">Add New Item</div>
            <form id="add-item-form" onsubmit="handleAddItem(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="item-sku">SKU *</label>
                        <input class="form-input" type="text" id="item-sku" required placeholder="e.g., ITEM-001">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="item-name">Name *</label>
                        <input class="form-input" type="text" id="item-name" required placeholder="e.g., Widget">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="item-stock">Initial Stock *</label>
                        <input class="form-input" type="number" id="item-stock" required min="0" placeholder="e.g., 100">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="item-location">Location</label>
                        <input class="form-input" type="text" id="item-location" placeholder="e.g., Warehouse A, Shelf 3">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="item-cost">Unit Cost (Optional)</label>
                        <input class="form-input" type="number" id="item-cost" step="0.01" min="0" placeholder="e.g., 5.99">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="item-currency">Currency</label>
                        <select class="form-input" id="item-currency">
                            <option value="GBP" selected>GBP (£)</option>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="item-description">Description (Optional)</label>
                    <input class="form-input" type="text" id="item-description" placeholder="Brief description">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Add Item</button>
                    <button type="button" class="btn" onclick="closeAddModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ═══════════════════════════════════ REPLENISH MODAL ═══════════════════════════════════ -->
    <div id="replenish-modal" class="modal-backdrop">
        <div class="modal-box modal-sm">
            <div class="modal-header">Replenish Stock</div>
            <p id="replenish-item-name" style="color: var(--text-secondary); margin-bottom: 20px; font-size: 15px;"></p>
            <div class="form-group">
                <label class="form-label" for="replenish-quantity">Quantity to Add</label>
                <input class="form-input" type="number" id="replenish-quantity" min="1" placeholder="Enter quantity" onkeydown="if(event.key==='Enter')confirmReplenish()">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="confirmReplenish()">Add Stock</button>
                <button class="btn" onclick="closeReplenishModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════ QR CODE MODAL ═══════════════════════════════════ -->
    <div id="qr-modal" class="modal-backdrop">
        <div class="modal-box modal-sm">
            <div class="modal-header" id="qr-modal-title"></div>
            <div class="qr-image-wrap" id="qr-modal-image"></div>
            <p class="qr-url" id="qr-modal-url"></p>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="printQR()">🖨️ Print</button>
                <button class="btn" onclick="closeQRModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('authToken');
        let currentUsername = localStorage.getItem('username');
        let currentUserRole = localStorage.getItem('userRole') || 'user';
        let items = [];
        let searchTerm = '';

        // Check authentication on load
        if (authToken) {
            showDashboard();
        }

        function isAdmin() {
            return currentUserRole === 'admin';
        }

        // ── Tab switching ──
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }

            document.getElementById('alert-login').innerHTML = '';
        }

        // ── Login ──
        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                authToken = data.token;
                currentUsername = data.username;
                currentUserRole = data.role || 'user';
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('username', currentUsername);
                localStorage.setItem('userRole', currentUserRole);

                showDashboard();
            } catch (error) {
                showLoginAlert(error.message, 'error');
            }
        }

        // ── Register ──
        async function handleRegister(e) {
            e.preventDefault();

            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-password-confirm').value;

            if (password !== confirmPassword) {
                showLoginAlert('Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    if (response.status === 403) {
                        showLoginAlert(data.error || 'Registration is disabled. Contact an administrator.', 'error');
                    } else {
                        throw new Error(data.error || 'Registration failed');
                    }
                    return;
                }

                const message = data.isFirstUser
                    ? 'Admin account created successfully! You are the first user. Please login.'
                    : 'Account created successfully! Please login. Note: your account has general user access.';
                showLoginAlert(message, 'success');
                setTimeout(() => switchTab('login'), 1500);
            } catch (error) {
                showLoginAlert(error.message, 'error');
            }
        }

        function showLoginAlert(message, type) {
            document.getElementById('alert-login').innerHTML = `
                <div class="alert alert-${type}">${escapeHtml(message)}</div>
            `;
        }

        // ── Show dashboard ──
        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('username-display').textContent = `${currentUsername} (${currentUserRole})`;

            if (isAdmin()) {
                document.getElementById('users-btn').classList.remove('hidden');
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            }

            loadItems();
        }

        // ── Logout ──
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('username');
            localStorage.removeItem('userRole');
            authToken = null;
            currentUsername = null;
            currentUserRole = null;
            location.reload();
        }

        // ── Load items ──
        async function loadItems() {
            try {
                const response = await fetch(`${API_BASE}/items`);
                items = await response.json();
                updateStats();
                displayItems();
            } catch (error) {
                console.error('Failed to load items:', error);
            }
        }

        // ── Stats ──
        function updateStats() {
            const totalItems = items.length;
            const totalStock = items.reduce((sum, item) => sum + item.stockQuantity, 0);
            const lowStock = items.filter(item => item.stockQuantity > 0 && item.stockQuantity <= 5).length;
            const outOfStock = items.filter(item => item.stockQuantity === 0).length;

            document.getElementById('stat-total').textContent = totalItems;
            document.getElementById('stat-stock').textContent = totalStock;
            document.getElementById('stat-low').textContent = lowStock;
            document.getElementById('stat-outofstock').textContent = outOfStock;
        }

        // ── Search filter ──
        function filterItems(term) {
            searchTerm = term.toLowerCase();
            displayItems();
        }

        // ── Display items ──
        function displayItems() {
            const container = document.getElementById('items-container');

            const filtered = searchTerm
                ? items.filter(item =>
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.sku.toLowerCase().includes(searchTerm) ||
                    (item.location || '').toLowerCase().includes(searchTerm)
                  )
                : items;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <div class="empty-state-text">${items.length === 0 ? 'No items yet. Add your first item above!' : 'No items match your search.'}</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(item => {
                const stockClass = getStockClass(item.stockQuantity);

                let actionsHtml = '';
                if (isAdmin()) {
                    actionsHtml = `
                        <div class="item-actions">
                            <button class="action-btn qr-btn" data-sku="${escapeAttr(item.sku)}">📱 QR Code</button>
                            <button class="action-btn replenish-btn" data-sku="${escapeAttr(item.sku)}">➕ Replenish</button>
                            <button class="action-btn delete delete-btn" data-sku="${escapeAttr(item.sku)}">🗑️ Delete</button>
                        </div>
                    `;
                } else {
                    actionsHtml = `
                        <div class="item-actions">
                            <button class="action-btn qr-btn" data-sku="${escapeAttr(item.sku)}">📱 QR Code</button>
                        </div>
                    `;
                }

                const costLine = item.unitCost != null
                    ? `<div class="detail-row"><span class="detail-label">Unit Cost</span><span class="detail-value">${getCurrencySymbol(item.currency)}${item.unitCost.toFixed(2)}</span></div>`
                    : '';
                const locationLine = item.location
                    ? `<div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${escapeHtml(item.location)}</span></div>`
                    : '';
                const descLine = item.description
                    ? `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${escapeHtml(item.description)}</span></div>`
                    : '';

                return `
                    <div class="item-card">
                        <div class="item-header">
                            <div>
                                <div class="item-name">${escapeHtml(item.name)}</div>
                                <div class="item-sku">SKU: ${escapeHtml(item.sku)}</div>
                            </div>
                            <div class="stock-badge ${stockClass}">${item.stockQuantity}</div>
                        </div>
                        <div class="item-details">
                            ${locationLine}
                            ${costLine}
                            ${descLine}
                        </div>
                        ${actionsHtml}
                    </div>
                `;
            }).join('');
        }

        function getStockClass(stock) {
            if (stock <= 0) return 'low';
            if (stock <= 5) return 'low';
            if (stock <= 20) return 'medium';
            return 'high';
        }

        // ── Add item modal ──
        function openAddModal() {
            document.getElementById('add-modal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('active');
        }

        document.getElementById('add-modal').addEventListener('click', function(e) {
            if (e.target === this) closeAddModal();
        });

        async function handleAddItem(e) {
            e.preventDefault();

            const costValue = document.getElementById('item-cost').value;
            const itemData = {
                sku: document.getElementById('item-sku').value.trim(),
                name: document.getElementById('item-name').value.trim(),
                stockQuantity: parseInt(document.getElementById('item-stock').value),
                location: document.getElementById('item-location').value.trim(),
                description: document.getElementById('item-description').value.trim(),
                currency: document.getElementById('item-currency').value
            };

            if (costValue && costValue !== '') {
                itemData.unitCost = parseFloat(costValue);
            }

            try {
                const response = await fetch(`${API_BASE}/items`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(itemData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to add item');
                }

                closeAddModal();
                document.getElementById('add-item-form').reset();
                document.getElementById('item-currency').value = 'GBP';
                showAddAlert('Item added successfully!', 'success');
                loadItems();
            } catch (error) {
                showAddAlert(error.message, 'error');
            }
        }

        function showAddAlert(message, type) {
            document.getElementById('alert-add').innerHTML = `
                <div class="alert alert-${type}">${escapeHtml(message)}</div>
            `;
            setTimeout(() => {
                document.getElementById('alert-add').innerHTML = '';
            }, 3000);
        }

        // ── QR Code modal ──
        async function showQRCode(sku) {
            try {
                const response = await fetch(`${API_BASE}/items/${sku}/qrcode`);
                const data = await response.json();

                document.getElementById('qr-modal-title').textContent = data.name;
                document.getElementById('qr-modal-image').innerHTML = `<img src="${data.qrCodeDataUrl}" alt="QR Code">`;
                document.getElementById('qr-modal-url').textContent = data.scanUrl;
                document.getElementById('qr-modal').classList.add('active');
            } catch (error) {
                alert('Failed to generate QR code: ' + error.message);
            }
        }

        function closeQRModal() {
            document.getElementById('qr-modal').classList.remove('active');
        }

        document.getElementById('qr-modal').addEventListener('click', function(e) {
            if (e.target === this) closeQRModal();
        });

        function printQR() {
            window.print();
        }

        // ── Replenish modal ──
        let replenishSku = null;

        function replenishStock(sku) {
            const item = items.find(i => i.sku === sku);
            if (!item) return;
            replenishSku = sku;
            document.getElementById('replenish-item-name').textContent = item.name;
            document.getElementById('replenish-quantity').value = '';
            document.getElementById('replenish-modal').classList.add('active');
            setTimeout(() => document.getElementById('replenish-quantity').focus(), 50);
        }

        function closeReplenishModal() {
            document.getElementById('replenish-modal').classList.remove('active');
            replenishSku = null;
        }

        document.getElementById('replenish-modal').addEventListener('click', function(e) {
            if (e.target === this) closeReplenishModal();
        });

        async function confirmReplenish() {
            const quantity = parseInt(document.getElementById('replenish-quantity').value);
            if (!quantity || quantity <= 0) return;

            const sku = replenishSku;
            closeReplenishModal();

            try {
                const response = await fetch(`${API_BASE}/items/${sku}/replenish`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ quantity })
                });

                if (!response.ok) {
                    throw new Error('Failed to replenish stock');
                }

                loadItems();
            } catch (error) {
                alert(error.message);
            }
        }

        // ── Delete item ──
        async function deleteItem(sku) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            try {
                const response = await fetch(`${API_BASE}/items/${sku}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to delete item');
                }

                loadItems();
            } catch (error) {
                alert(error.message);
            }
        }

        // ── Helpers ──
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function getCurrencySymbol(currency) {
            const symbols = { GBP: '£', USD: '$', EUR: '€' };
            return symbols[currency] || currency;
        }

        // ── Export CSV ──
        function exportToCSV() {
            if (items.length === 0) {
                alert('No items to export!');
                return;
            }

            const headers = ['SKU', 'Name', 'Stock Quantity', 'Unit Cost', 'Currency', 'Location', 'Description'];
            const csvRows = [headers.join(',')];

            items.forEach(item => {
                const row = [
                    `"${item.sku}"`,
                    `"${item.name}"`,
                    item.stockQuantity,
                    item.unitCost !== null && item.unitCost !== undefined ? item.unitCost : '',
                    item.currency || 'GBP',
                    `"${item.location || ''}"`,
                    `"${item.description || ''}"`
                ];
                csvRows.push(row.join(','));
            });

            const csvContent = csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            const timestamp = new Date().toISOString().split('T')[0];

            link.setAttribute('href', url);
            link.setAttribute('download', `inventory-${timestamp}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert(`✓ Exported ${items.length} items to CSV!`);
        }

        // ── Import CSV ──
        async function handleCSVImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const text = e.target.result;
                    const rows = text.split('\n').map(row => row.trim()).filter(row => row);

                    if (rows.length < 2) {
                        throw new Error('CSV file is empty or invalid');
                    }

                    const dataRows = rows.slice(1);
                    let successCount = 0;
                    let errorCount = 0;
                    let updateCount = 0;
                    const errors = [];

                    for (const row of dataRows) {
                        try {
                            const parseCSVRow = (row) => {
                                const fields = [];
                                let field = '';
                                let inQuotes = false;

                                for (let i = 0; i < row.length; i++) {
                                    const char = row[i];
                                    const nextChar = row[i + 1];

                                    if (char === '"') {
                                        if (inQuotes && nextChar === '"') {
                                            field += '"';
                                            i++;
                                        } else {
                                            inQuotes = !inQuotes;
                                        }
                                    } else if (char === ',' && !inQuotes) {
                                        fields.push(field.trim());
                                        field = '';
                                    } else {
                                        field += char;
                                    }
                                }

                                fields.push(field.trim());
                                return fields;
                            };

                            const fields = parseCSVRow(row);

                            if (fields.length < 3) {
                                errors.push(`Invalid row format: ${row.substring(0, 50)}`);
                                errorCount++;
                                continue;
                            }

                            const [sku, name, stockQuantity, unitCost = '', currency = 'GBP', location = '', description = ''] = fields;

                            const existingItem = items.find(i => i.sku === sku);
                            const itemPayload = {
                                name,
                                stockQuantity: parseInt(stockQuantity),
                                location,
                                description,
                                currency
                            };

                            if (unitCost && unitCost !== '' && !isNaN(parseFloat(unitCost))) {
                                itemPayload.unitCost = parseFloat(unitCost);
                            }

                            if (existingItem) {
                                const response = await fetch(`${API_BASE}/items/${sku}`, {
                                    method: 'PUT',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${authToken}`
                                    },
                                    body: JSON.stringify(itemPayload)
                                });

                                if (response.ok) {
                                    updateCount++;
                                } else {
                                    const data = await response.json();
                                    errors.push(`Update failed for ${sku}: ${data.error}`);
                                    errorCount++;
                                }
                            } else {
                                const response = await fetch(`${API_BASE}/items`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${authToken}`
                                    },
                                    body: JSON.stringify({ sku, ...itemPayload })
                                });

                                if (response.ok) {
                                    successCount++;
                                } else {
                                    const data = await response.json();
                                    errors.push(`Failed to add ${sku}: ${data.error}`);
                                    errorCount++;
                                }
                            }
                        } catch (err) {
                            errors.push(`Error processing row: ${err.message}`);
                            errorCount++;
                        }
                    }

                    await loadItems();

                    let message = `Import complete!\n\n`;
                    if (successCount > 0) message += `✓ ${successCount} new items added\n`;
                    if (updateCount > 0) message += `✓ ${updateCount} items updated\n`;
                    if (errorCount > 0) message += `✗ ${errorCount} errors\n`;

                    if (errors.length > 0 && errors.length <= 5) {
                        message += `\nErrors:\n${errors.join('\n')}`;
                    } else if (errors.length > 5) {
                        message += `\nShowing first 5 errors:\n${errors.slice(0, 5).join('\n')}`;
                    }

                    alert(message);
                } catch (error) {
                    alert('Failed to import CSV: ' + error.message);
                } finally {
                    event.target.value = '';
                }
            };

            reader.readAsText(file);
        }

        // ── Event delegation for item buttons ──
        document.getElementById('items-container').addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-sku]');
            if (!btn) return;
            const sku = btn.dataset.sku;
            if (btn.classList.contains('qr-btn')) showQRCode(sku);
            else if (btn.classList.contains('replenish-btn')) replenishStock(sku);
            else if (btn.classList.contains('delete-btn')) deleteItem(sku);
        });

        // ── Print all QR codes ──
        async function printAllQRCodes() {
            if (items.length === 0) {
                alert('No items to print.');
                return;
            }

            const btn = document.getElementById('print-all-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Loading...';

            try {
                // Fetch all QR codes in parallel
                const results = await Promise.all(
                    items.map(item =>
                        fetch(`${API_BASE}/items/${encodeURIComponent(item.sku)}/qrcode`)
                            .then(r => r.json())
                            .catch(() => null)
                    )
                );

                const qrItems = results.filter(Boolean);

                const printWindow = window.open('', '_blank');
                printWindow.document.write(`<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QR Codes - Stock Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: white; color: #111; }
        h1 { font-size: 18px; padding: 16px 20px; border-bottom: 2px solid #111; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 0 20px 20px;
        }
        .qr-card {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
            page-break-inside: avoid;
            break-inside: avoid;
        }
        .qr-card img { width: 140px; height: 140px; display: block; margin: 0 auto 8px; }
        .qr-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; word-break: break-word; }
        .qr-sku  { font-size: 11px; color: #555; word-break: break-all; }
        .qr-loc  { font-size: 11px; color: #777; margin-top: 3px; }
        @media print {
            h1 { border-bottom: 2px solid #000; }
            .qr-card { border: 1px solid #000; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <h1>📦 Stock Control — QR Codes
        <span style="float:right">
            <button class="no-print" onclick="window.print()" style="padding:6px 14px;cursor:pointer;font-size:13px;">🖨️ Print</button>
            <button class="no-print" onclick="window.close()" style="padding:6px 14px;cursor:pointer;font-size:13px;margin-left:6px;">Close</button>
        </span>
    </h1>
    <div class="grid">
        ${qrItems.map(q => {
            const item = items.find(i => i.sku === q.sku) || {};
            return `
            <div class="qr-card">
                <img src="${q.qrCodeDataUrl}" alt="QR ${escapeHtml(q.sku)}">
                <div class="qr-name">${escapeHtml(q.name)}</div>
                <div class="qr-sku">${escapeHtml(q.sku)}</div>
                ${item.location ? `<div class="qr-loc">📍 ${escapeHtml(item.location)}</div>` : ''}
            </div>`;
        }).join('')}
    </div>
</body>
</html>`);
                printWindow.document.close();
            } catch (error) {
                alert('Failed to load QR codes: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // ── Auto-refresh every 30 seconds ──
        setInterval(loadItems, 30000);
    </script>
</body>
</html>
