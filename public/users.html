<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Stock Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --accent-primary: #ff6b35;
            --accent-secondary: #ffa94d;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --border-color: #4a4a4a;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border-bottom: 2px solid var(--accent-primary);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .logo {
            width: 44px; height: 44px;
            background: var(--accent-primary);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: var(--bg-primary);
        }

        .header h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); }

        .header-nav { display: flex; gap: 8px; }

        .nav-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 9px 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* ── Container ── */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
        }

        /* ── Info box ── */
        .info-box {
            background: rgba(90, 125, 154, 0.15);
            border-left: 3px solid #5a7d9a;
            color: #90caf9;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 14px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        /* ── Sections ── */
        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 28px;
            margin-bottom: 24px;
            clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
        }

        .section h2 {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent-primary);
        }

        /* ── Forms ── */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        input:focus, select:focus { outline: none; border-color: var(--accent-primary); }
        input::placeholder { color: var(--text-secondary); }

        /* ── Buttons ── */
        .btn {
            padding: 11px 22px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            font-family: inherit;
        }

        .btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); color: var(--bg-primary); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-small { padding: 7px 14px; font-size: 12px; }

        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); border-color: var(--danger); color: white; }

        /* ── Alerts ── */
        .alert {
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .alert-error   { background: rgba(244, 67, 54, 0.15); color: #ff6b6b; border-left: 3px solid var(--danger); }
        .alert-success { background: rgba(76, 175, 80, 0.15); color: #69db7c; border-left: 3px solid var(--success); }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; }

        th {
            background: var(--bg-primary);
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
        }

        tr:hover td { background: var(--bg-primary); }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
        }

        .badge-admin { background: var(--accent-primary); color: var(--bg-primary); }
        .badge-user  { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border-color); }

        /* ── Spinner ── */
        .loading { text-align: center; padding: 48px; }

        .spinner {
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            width: 48px; height: 48px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { color: var(--text-secondary); font-size: 14px; }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 16px; padding: 20px; }
            .header-nav { flex-wrap: wrap; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo">SC</div>
                <h1>User Management</h1>
            </div>
            <div class="header-nav">
                <a href="/admin.html" class="nav-btn">📦 Dashboard</a>
                <a href="/reports.html" class="nav-btn">📊 Reports</a>
                <a href="/guide.html" class="nav-btn">📖 Guide</a>
                <button class="nav-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="info-box">
            <strong>Administrator Privileges</strong><br>
            As an administrator, you can create new users and assign roles. You can create other administrators or general users.
        </div>

        <div class="section">
            <h2>➕ Create New User</h2>
            <div id="alert-create"></div>
            <form id="create-user-form" onsubmit="handleCreateUser(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="new-username">Username *</label>
                        <input type="text" id="new-username" required placeholder="e.g., john">
                    </div>
                    <div class="form-group">
                        <label for="new-password">Password *</label>
                        <input type="password" id="new-password" required minlength="10" placeholder="Min 10 chars, uppercase &amp; number">
                    </div>
                    <div class="form-group">
                        <label for="new-role">Role *</label>
                        <select id="new-role" required>
                            <option value="user">General User</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn">Create User</button>
            </form>
        </div>

        <div class="section">
            <h2>📋 Existing Users</h2>
            <div id="users-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('authToken');
        let currentUserId = null;
        let users = [];

        // Check authentication and admin status
        async function checkAuth() {
            if (!authToken) {
                window.location.href = '/admin.html';
                return false;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Authentication failed');
                }

                const user = await response.json();
                currentUserId = user.id;

                if (user.role !== 'admin') {
                    alert('Access denied. Administrator privileges required.');
                    window.location.href = '/admin.html';
                    return false;
                }

                return true;
            } catch (error) {
                console.error('Auth check failed:', error);
                localStorage.removeItem('authToken');
                window.location.href = '/admin.html';
                return false;
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load users');
                }

                users = await response.json();
                displayUsers();
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-container').innerHTML = `
                    <div class="alert alert-error">
                        <strong>Error:</strong> ${escapeHtml(error.message)}
                    </div>
                `;
            }
        }

        // Display users
        function displayUsers() {
            const container = document.getElementById('users-container');

            if (users.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No users found.</p>';
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Created</th>
                            <th>Created By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => {
                            const isCurrentUser = user.id === currentUserId;
                            const badgeClass = user.role === 'admin' ? 'badge-admin' : 'badge-user';
                            const roleLabel = user.role === 'admin' ? 'Administrator' : 'General User';
                            const createdDate = new Date(user.createdAt).toLocaleDateString();

                            return `
                                <tr>
                                    <td><strong>${escapeHtml(user.username)}</strong>${isCurrentUser ? ' <em style="color:var(--text-secondary)">(You)</em>' : ''}</td>
                                    <td><span class="badge ${badgeClass}">${roleLabel}</span></td>
                                    <td>${createdDate}</td>
                                    <td>${escapeHtml(user.createdBy || 'N/A')}</td>
                                    <td>
                                        ${isCurrentUser ?
                                            '<span style="color: var(--text-secondary); font-size: 13px;">Cannot delete yourself</span>' :
                                            `<button class="btn btn-small btn-danger delete-user-btn" data-user-id="${user.id}">Delete</button>`
                                        }
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        // Handle create user
        async function handleCreateUser(e) {
            e.preventDefault();

            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create user');
                }

                showAlert('User created successfully!', 'success');
                document.getElementById('create-user-form').reset();
                loadUsers();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        // Event delegation for delete buttons
        document.getElementById('users-container').addEventListener('click', (e) => {
            const btn = e.target.closest('.delete-user-btn');
            if (!btn) return;
            deleteUser(parseInt(btn.dataset.userId));
        });

        // Delete user
        async function deleteUser(userId) {
            const user = users.find(u => u.id === userId);
            const username = user ? user.username : `User #${userId}`;
            if (!confirm(`Are you sure you want to delete user "${username}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to delete user');
                }

                showAlert(`User "${username}" deleted successfully`, 'success');
                loadUsers();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Show alert
        function showAlert(message, type) {
            document.getElementById('alert-create').innerHTML = `
                <div class="alert alert-${type}">${escapeHtml(message)}</div>
            `;
            setTimeout(() => {
                document.getElementById('alert-create').innerHTML = '';
            }, 3000);
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('username');
            localStorage.removeItem('userRole');
            window.location.href = '/admin.html';
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        checkAuth().then(isAuthorized => {
            if (isAuthorized) loadUsers();
        });
    </script>
</body>
</html>
