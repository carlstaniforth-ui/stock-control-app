<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Item - Stock Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --accent-primary: #ff6b35;
            --accent-secondary: #ffa94d;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --border-color: #4a4a4a;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            max-width: 480px;
            width: 100%;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border-bottom: 2px solid var(--accent-primary);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: var(--bg-primary);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .content {
            padding: 24px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 48px 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p { color: var(--text-secondary); font-size: 14px; }

        /* Item info */
        .item-info {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 20px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .item-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .item-sku {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .stock-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-secondary);
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .stock-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stock-value {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .stock-value.low    { color: var(--danger); }
        .stock-value.medium { color: var(--warning); }
        .stock-value.high   { color: var(--success); }

        .item-description {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .item-location {
            display: inline-block;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 5px 12px;
            font-size: 12px;
            margin-top: 10px;
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
        }

        /* Quantity selector */
        .deplete-section { margin-top: 20px; }

        .quantity-input-wrapper { margin-bottom: 24px; }

        .quantity-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-align: center;
        }

        .quantity-input-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .qty-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 52px;
            height: 52px;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .qty-btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); color: var(--bg-primary); }
        .qty-btn:active { transform: scale(0.95); }

        .qty-input {
            width: 90px;
            height: 60px;
            background: var(--bg-primary);
            border: 2px solid var(--accent-primary);
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            font-family: inherit;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .qty-input:focus { outline: none; }
        .qty-input::-webkit-inner-spin-button,
        .qty-input::-webkit-outer-spin-button { opacity: 1; height: 50px; }

        /* Buttons */
        .deplete-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-primary);
            border: none;
            color: var(--bg-primary);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            margin-bottom: 10px;
            font-family: inherit;
        }

        .deplete-btn:hover { background: var(--accent-secondary); transform: translateY(-2px); }
        .deplete-btn:active { transform: translateY(0); }
        .deplete-btn:disabled { background: var(--bg-tertiary); color: var(--text-secondary); cursor: not-allowed; transform: none; }

        .btn-secondary {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            margin-top: 0;
            font-family: inherit;
        }

        .btn-secondary:hover { border-color: var(--accent-primary); color: var(--text-primary); }

        /* Alerts */
        .alert {
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .alert-error   { background: rgba(244, 67, 54, 0.15); color: #ff6b6b; border-left: 3px solid var(--danger); }
        .alert-success { background: rgba(76, 175, 80, 0.15); color: #69db7c; border-left: 3px solid var(--success); }
        .alert-info    { background: rgba(90, 125, 154, 0.2); color: #90caf9; border-left: 3px solid var(--steel-blue, #5a7d9a); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SC</div>
            <div class="header-text">
                <h1>Stock Control</h1>
                <p>Scan &amp; Deplete Inventory</p>
            </div>
        </div>
        <div class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading item...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentItem = null;
        let quantity = 1;

        // Simple PIN check (before depletion)
        const SCAN_PIN = '1234'; // Change this!

        // Get SKU from URL parameters
        function getSKU() {
            const params = new URLSearchParams(window.location.search);
            return params.get('sku');
        }

        // Load item data
        async function loadItem() {
            const sku = getSKU();

            if (!sku) {
                showError('No SKU provided in URL');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/items/${sku}`);

                if (!response.ok) {
                    throw new Error('Item not found');
                }

                currentItem = await response.json();
                displayItem();
            } catch (error) {
                showError('Failed to load item: ' + error.message);
            }
        }

        // Display item information
        function displayItem() {
            const stockClass = getStockClass(currentItem.stockQuantity);

            document.getElementById('content').innerHTML = `
                <div class="item-info">
                    <div class="item-name">${escapeHtml(currentItem.name)}</div>
                    <div class="item-sku">SKU: ${escapeHtml(currentItem.sku)}</div>

                    <div class="stock-display">
                        <span class="stock-label">Current Stock</span>
                        <span class="stock-value ${stockClass}">${currentItem.stockQuantity}</span>
                    </div>

                    ${currentItem.description ? `<div class="item-description">${escapeHtml(currentItem.description)}</div>` : ''}
                    ${currentItem.location ? `<div class="item-location">📍 ${escapeHtml(currentItem.location)}</div>` : ''}
                </div>

                <div id="alert-container"></div>

                <div class="deplete-section">
                    <div class="quantity-input-wrapper">
                        <div class="quantity-label">How many are you taking?</div>
                        <div class="quantity-input-container">
                            <button class="qty-btn" onclick="decreaseQuantity()">−</button>
                            <input
                                type="number"
                                class="qty-input"
                                id="qty-input"
                                value="1"
                                min="1"
                                max="${currentItem.stockQuantity}"
                                oninput="updateQuantityFromInput()"
                            >
                            <button class="qty-btn" onclick="increaseQuantity()">+</button>
                        </div>
                    </div>

                    <button class="deplete-btn" onclick="depleteStock()" id="deplete-btn">
                        ✓ Confirm
                    </button>

                    <button class="btn-secondary" onclick="location.reload()">
                        🔄 Refresh
                    </button>
                </div>
            `;
        }

        // Get stock level class
        function getStockClass(stock) {
            if (stock === 0) return 'low';
            if (stock <= 5) return 'low';
            if (stock <= 20) return 'medium';
            return 'high';
        }

        // Update quantity from input field
        function updateQuantityFromInput() {
            const input = document.getElementById('qty-input');
            let value = parseInt(input.value) || 1;

            if (value < 1) value = 1;
            if (value > currentItem.stockQuantity) value = currentItem.stockQuantity;

            input.value = value;
            quantity = value;
        }

        // Increase quantity
        function increaseQuantity() {
            const input = document.getElementById('qty-input');
            if (quantity < currentItem.stockQuantity) {
                quantity++;
                input.value = quantity;
            }
        }

        // Decrease quantity
        function decreaseQuantity() {
            const input = document.getElementById('qty-input');
            if (quantity > 1) {
                quantity--;
                input.value = quantity;
            }
        }

        // Deplete stock
        async function depleteStock() {
            const enteredPin = prompt('Enter PIN to deplete stock:');
            if (enteredPin !== SCAN_PIN) {
                alert('❌ Incorrect PIN');
                return;
            }

            if (!currentItem || currentItem.stockQuantity < quantity) {
                showAlert('Insufficient stock!', 'error');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                return;
            }

            const btn = document.getElementById('deplete-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';

            try {
                const response = await fetch(`${API_BASE}/items/${currentItem.sku}/deplete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to deplete stock');
                }

                if (navigator.vibrate) navigator.vibrate(200);

                btn.textContent = '✓ Success!';
                btn.style.background = '#4caf50';

                const itemsText = quantity === 1 ? 'item' : 'items';
                showAlert(`✓ Confirmed! ${quantity} ${itemsText} removed. New stock: ${data.item.currentStock}`, 'success');

                setTimeout(() => {
                    quantity = 1;
                    loadItem();
                }, 2000);

            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = originalText;
                btn.style.background = '';
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        // Show alert message
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${escapeHtml(message)}</div>`;

            if (type === 'success') {
                setTimeout(() => { container.innerHTML = ''; }, 3000);
            }
        }

        // Show error
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="alert alert-error">
                    <strong>Error:</strong> ${escapeHtml(message)}
                </div>
                <button class="btn-secondary" onclick="location.reload()">
                    🔄 Try Again
                </button>
            `;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadItem();
    </script>
</body>
</html>
