<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Stock Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f7fafc;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-header {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-header:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .section h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-danger {
            background: #f56565;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #fc8181;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #68d391;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7fafc;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        tr:hover {
            background: #f7fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-admin {
            background: #667eea;
            color: white;
        }

        .badge-user {
            background: #e2e8f0;
            color: #4a5568;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #096dd9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>👥 User Management</h1>
            <div class="header-buttons">
                <a href="/admin.html" class="btn-header">📦 Dashboard</a>
                <a href="/reports.html" class="btn-header">📊 Reports</a>
                <a href="/guide.html" class="btn-header">📖 Guide</a>
                <button class="btn-header" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="info-box">
            <strong>ℹ️ Administrator Privileges</strong><br>
            As an administrator, you can create new users and assign roles. You can create other administrators or general users.
        </div>

        <div class="section">
            <h2>➕ Create New User</h2>
            <div id="alert-create"></div>
            <form id="create-user-form" onsubmit="handleCreateUser(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="new-username">Username *</label>
                        <input type="text" id="new-username" required placeholder="e.g., john">
                    </div>
                    <div class="form-group">
                        <label for="new-password">Password *</label>
                        <input type="password" id="new-password" required minlength="6" placeholder="Min 6 characters">
                    </div>
                    <div class="form-group">
                        <label for="new-role">Role *</label>
                        <select id="new-role" required>
                            <option value="user">General User</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn">Create User</button>
            </form>
        </div>

        <div class="section">
            <h2>📋 Existing Users</h2>
            <div id="users-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('authToken');
        let currentUserId = null;
        let users = [];

        // Check authentication and admin status
        async function checkAuth() {
            if (!authToken) {
                window.location.href = '/admin.html';
                return false;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Authentication failed');
                }

                const user = await response.json();
                currentUserId = user.id;

                if (user.role !== 'admin') {
                    alert('Access denied. Administrator privileges required.');
                    window.location.href = '/admin.html';
                    return false;
                }

                return true;
            } catch (error) {
                console.error('Auth check failed:', error);
                localStorage.removeItem('authToken');
                window.location.href = '/admin.html';
                return false;
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load users');
                }

                users = await response.json();
                displayUsers();
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-container').innerHTML = `
                    <div class="alert alert-error">
                        <strong>Error:</strong> ${escapeHtml(error.message)}
                    </div>
                `;
            }
        }

        // Display users
        function displayUsers() {
            const container = document.getElementById('users-container');

            if (users.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #718096; padding: 40px;">No users found.</p>';
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Created</th>
                            <th>Created By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => {
                            const isCurrentUser = user.id === currentUserId;
                            const badgeClass = user.role === 'admin' ? 'badge-admin' : 'badge-user';
                            const roleLabel = user.role === 'admin' ? 'Administrator' : 'General User';
                            const createdDate = new Date(user.createdAt).toLocaleDateString();

                            return `
                                <tr>
                                    <td><strong>${escapeHtml(user.username)}</strong>${isCurrentUser ? ' <em>(You)</em>' : ''}</td>
                                    <td><span class="badge ${badgeClass}">${roleLabel}</span></td>
                                    <td>${createdDate}</td>
                                    <td>${escapeHtml(user.createdBy || 'N/A')}</td>
                                    <td>
                                        ${isCurrentUser ? 
                                            '<span style="color: #718096; font-size: 13px;">Cannot delete yourself</span>' : 
                                            `<button class="btn btn-small btn-danger" onclick="deleteUser(${user.id}, '${escapeHtml(user.username)}')">Delete</button>`
                                        }
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        // Handle create user
        async function handleCreateUser(e) {
            e.preventDefault();

            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create user');
                }

                showAlert('User created successfully!', 'success');
                document.getElementById('create-user-form').reset();
                loadUsers();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        // Delete user
        async function deleteUser(userId, username) {
            if (!confirm(`Are you sure you want to delete user "${username}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to delete user');
                }

                showAlert(`User "${username}" deleted successfully`, 'success');
                loadUsers();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Show alert
        function showAlert(message, type) {
            document.getElementById('alert-create').innerHTML = `
                <div class="alert alert-${type}">${escapeHtml(message)}</div>
            `;
            setTimeout(() => {
                document.getElementById('alert-create').innerHTML = '';
            }, 3000);
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('username');
            localStorage.removeItem('userRole');
            window.location.href = '/admin.html';
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        checkAuth().then(isAuthorized => {
            if (isAuthorized) {
                loadUsers();
            }
        });
    </script>
</body>
</html>
